[advisories]
# Acknowledge and ignore "unmaintained" warnings for deep transitive dependencies
# that do not have active security vulnerabilities.
ignore = [
    "RUSTSEC-2025-0052", # async-std
    "RUSTSEC-2024-0375", # atty
    "RUSTSEC-2024-0384", # instant
    "RUSTSEC-2024-0436", # paste
    "RUSTSEC-2024-0370", # proc-macro-error
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "LGPL-3.0-only",
    "CDLA-Permissive-2.0"
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
